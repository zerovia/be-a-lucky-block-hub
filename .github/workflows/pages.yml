name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          AC919D: ${{ secrets.AC919D }}
          BE3DEE: ${{ secrets.BE3DEE }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('AC919D', ''), os.environ.get('BE3DEE', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- 6e983678e4310da7d40b -->', a)
          if b:
              patched = patched.replace('<!-- 24858a15fed0c8e00f6c7120966193157d34d81ae62a -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
